<script>
let lastData={},apiKey=localStorage.getItem('deepseek_api_key')||'';

// ========== 基础指标 ==========
function calcRSI(p,n=14){
  if(p.length<n+1)return 50;
  let g=0,l=0;
  for(let i=p.length-n;i<p.length;i++){let d=p[i]-p[i-1];if(d>0)g+=d;else l-=d}
  let ag=g/n,al=l/n;if(al===0)return 100;
  return 100-100/(1+ag/al);
}
function calcMA(p,n=20){return p.length<n?p[p.length-1]:p.slice(-n).reduce((a,b)=>a+b,0)/n}
function calcEMA(p,n){let k=2/(n+1),e=p[0];for(let i=1;i<p.length;i++)e=p[i]*k+e*(1-k);return e}
function calcMACD(p){
  let m=[];for(let i=0;i<p.length;i++)m.push(calcEMA(p.slice(0,i+1),12)-calcEMA(p.slice(0,i+1),26));
  let last9=m.slice(-9);
  let signal=last9.length>=2?calcEMA(last9,9):(m.length>0?m[m.length-1]:0);
  return{macdLine:m[m.length-1],signalLine:signal,histogram:m[m.length-1]-signal};
}
function calcBB(p,n=20,s=2){
  if(p.length<n)return{upper:p[0],lower:p[0],sma:p[0]};
  let sma=calcMA(p,n),sl=p.slice(-n),v=sl.reduce((a,x)=>a+(x-sma)**2,0)/n,sd=Math.sqrt(v);
  return{upper:sma+sd*s,lower:sma-sd*s,sma};
}
function calcStoch(h,l,c,n=14){
  let sh=h.slice(-n),sl=l.slice(-n),hh=Math.max(...sh),ll=Math.min(...sl);
  let k=hh===ll?0:(c[c.length-1]-ll)/(hh-ll)*100;return{k,d:k};
}
function calcATR(h,l,c,n=14){
  let start=Math.max(0,h.length-n);
  let lh=h.slice(start),ll=l.slice(start),lc=c.slice(start);
  let t=[];for(let i=1;i<lh.length;i++)t.push(Math.max(lh[i]-ll[i],Math.abs(lh[i]-lc[i-1]),Math.abs(ll[i]-lc[i-1])));
  return t.length?t.reduce((a,b)=>a+b,0)/t.length:0;
}
function calcFib(hh,ll){let r=hh-ll;return{'0%':hh,'23.6%':hh-r*.236,'38.2%':hh-r*.382,'50%':hh-r*.5,'61.8%':hh-r*.618,'78.6%':hh-r*.786,'100%':ll,Support:hh-r*.382,Resistance:hh-r*.618,StrongSupport:ll,StrongResistance:hh};}

// ========== 🕯 K线形态识别 ==========
function detectPatterns(k){
  // k: [{o,h,l,c,v},...] 至少3根
  if(k.length<3)return[];
  let ps=[];
  const n=k.length;
  const c0=k[n-1],c1=k[n-2],c2=k[n-3]; // 最新3根
  
  const body=(c)=>({size:Math.abs(c.c-c.o),up:c.c>c.o,range:c.h-c.l,upper:c.c>c.o?c.c-c.o:0,lower:c.c<c.o?c.o-c.c:0});
  const b0=body(c0),b1=body(c1),b2=body(c2);
  const avgBody=(b0.size+b1.size+b2.size)/3||1;
  
  // 1. 吞没形态 (Engulfing)
  if(b0.up!==b1.up){
    if(b0.size>b1.size*1.2&&b0.size>avgBody*1.5){
      ps.push(b0.up?{name:'🟢 看涨吞没',dir:'bull',weight:3}
                   :{name:'🔴 看跌吞没',dir:'bear',weight:3});
    }
  }
  
  // 2. 锤子线 (Hammer) - 下影线 > 实体*2, 上影线很短
  if(b0.lower>avgBody*2&&(b0.range-b0.lower)<avgBody*0.3){
    ps.push(c0.c>c0.o?{name:'🔨 锤子线（看涨）',dir:'bull',weight:2}
                     :{name:'🔨 倒锤子（看涨）',dir:'bull',weight:2});
  }
  // 3. 吊颈线/射击之星 - 上影线 > 实体*2
  if(b0.upper>avgBody*2&&(b0.range-b0.upper)<avgBody*0.3){
    ps.push(c0.c>c0.o?{name:'⭐ 射击之星（看跌）',dir:'bear',weight:2}
                     :{name:'💀 吊颈线（看跌）',dir:'bear',weight:2});
  }
  
  // 4. 十字星 (Doji) - 实体 < 波动范围*0.1
  if(b0.range>0&&b0.size<b0.range*0.15){
    // 判断是顶部还是底部十字星
    const upTrend=c0.c>calcMA(k.slice(0,-1).map(x=>x.c),20);
    ps.push(upTrend?{name:'✝ 高位十字星（警惕反转）',dir:'bear',weight:1}
                   :{name:'✝ 低位十字星（可能反转）',dir:'bull',weight:1});
  }
  
  // 5. 晨星/黄昏之星（3根形态）
  if(b2.size>avgBody*1.5&&b1.size<avgBody*0.3&&b0.size>avgBody*1.2){
    if(!b2.up&&b0.up)ps.push({name:'🌟 晨星（强看涨）',dir:'bull',weight:3});
    if(b2.up&&!b0.up)ps.push({name:'🌑 黄昏之星（强看跌）',dir:'bear',weight:3});
  }
  
  // 6. 三连阳/三连阴
  if(k.length>=3){
    const c3=k[n-3];
    if(c3.c>c3.o&&c1.c>c1.o&&c0.c>c0.o&&(c2.c>c2.o||true))
      ps.push({name:'🔥 三连阳（强势）',dir:'bull',weight:2});
    if(c3.c<c3.o&&c1.c<c1.o&&c0.c<c0.o)
      ps.push({name:'❄ 三连阴（弱势）',dir:'bear',weight:2});
  }
  
  return ps;
}

// ========== 📊 OBV 能量潮 + 背离检测 ==========
function calcOBV(k){
  let obv=[k[0].v],div=null;
  for(let i=1;i<k.length;i++){
    let d=obv[i-1];
    if(k[i].c>k[i-1].c)d+=k[i].v;
    else if(k[i].c<k[i-1].c)d-=k[i].v;
    obv.push(d);
  }
  // 背离检测：价格+OBV 各取最后20根的趋势
  let n=Math.min(20,k.length);
  let pSl=k.slice(-n),oSl=obv.slice(-n);
  let pTrend=k[k.length-1].c-k[k.length-n].c;
  let obvFirst=oSl[0],obvLast=oSl[oSl.length-1];
  let obvTrend=obvLast-obvFirst;
  if(pTrend>0&&obvTrend<0&&Math.abs(obvTrend)>Math.abs(obvFirst)*0.05)
    div={type:'bear','name':'⚠️ 顶背离（价涨量缩→假涨）'};
  else if(pTrend<0&&obvTrend>0&&Math.abs(obvTrend)>Math.abs(obvFirst)*0.05)
    div={type:'bull','name':'💎 底背离（价跌量增→吸筹）'};
  return{val:obv[obv.length-1],trend:obvTrend>0?'up':obvTrend<0?'down':'flat',div};
}

// ========== 📐 关键价位 ==========
function keyLevels(h,l,c){
  // 摆动高低点（最近50根）
  let n=Math.min(50,h.length),swH=[],swL=[];
  for(let i=2;i<n-2;i++){
    let idx=h.length-n+i;
    if(h[idx]>h[idx-1]&&h[idx]>h[idx-2]&&h[idx]>h[idx+1]&&h[idx]>h[idx+2])swH.push(h[idx]);
    if(l[idx]<l[idx-1]&&l[idx]<l[idx-2]&&l[idx]<l[idx+1]&&l[idx]<l[idx+2])swL.push(l[idx]);
  }
  // 取最近的3个
  swH.sort((a,b)=>b-a);swL.sort((a,b)=>a-b);
  let rh=swH.slice(0,3),rl=swL.slice(0,3);
  
  // 整数关口
  let cp=c[c.length-1],rounds=[];
  let step=cp>1000?100:cp>100?10:cp>10?1:cp>1?0.1:0.01;
  for(let r=Math.floor(cp/step-step*5)*step;r<=Math.ceil(cp/step+step*5)*step;r+=step){
    if(r>cp*0.95&&r<cp*1.05&&Math.abs(r-cp)>step*0.5)rounds.push(r);
  }
  
  return{resistances:[...rh,...rounds.filter(r=>r>cp)].sort((a,b)=>a-b).slice(0,4),
         supports:[...rl,...rounds.filter(r=>r<cp)].sort((a,b)=>b-a).slice(0,4)};
}

// ========== ⚡ 成交量诊断 ==========
function volDiagnosis(k){
  let n=k.length,v=k.map(x=>x.v),last5=v.slice(-5),last20=v.slice(-20);
  let avg20=last20.reduce((a,b)=>a+b,0)/20;
  let avg5=last5.reduce((a,b)=>a+b,0)/5;
  let spike=avg20>0?avg5/avg20:1;
  let cv=v[v.length-1],cp=k[n-1].c,op=k[n-1].o;
  
  let diag=[];
  // 放量上涨 = 真突破
  if(spike>1.8&&cp>op)diag.push({name:'📈 放量上涨（真突破）',dir:'bull'});
  // 放量下跌 = 真砸盘
  if(spike>1.8&&cp<op)diag.push({name:'📉 放量下跌（真砸盘）',dir:'bear'});
  // 缩量反弹 = 假涨
  if(spike<0.6&&cp>op)diag.push({name:'⚠️ 缩量反弹（假涨/诱多）',dir:'bear'});
  // 缩量下跌 = 磨底
  if(spike<0.6&&cp<op)diag.push({name:'⏳ 缩量下跌（磨底/衰竭）',dir:'bull'});
  // 天量换手
  if(cv>avg20*3)diag.push({name:'💥 天量换手（主力进出）',dir:'neutral'});
  
  return{spike,avg20,cv,diag};
}

// ========== 🗳 综合投票 ==========
function vote(rsi,ma,cp,bb,macd,st,atr,av,fibo,e12,e26,patterns,obv,volDiag,htTrend){
  let b=0,br=0;
  // --- 原有10项 ---
  if(rsi>70)br++;else if(rsi<30)b++;else if(rsi>50)b++;else br++;
  if(macd.macdLine>macd.signalLine)b++;else br++;
  if(cp>bb.upper)br++;else if(cp<bb.lower)b++;
  if(cp>ma)b++;else br++;
  if(atr>av*1.2)b++;else if(atr<av*.8)br++;
  if(e12>0&&e26>0){if(e12>e26)b++;else br++;}
  if(av>0&&cp>ma)b++;else if(av>0&&cp<ma)br++;
  if(cp>bb.upper&&av>0)br++;else if(cp<bb.lower&&av>0)b++;
  if(st.k>st.d&&st.k<80)b++;else if(st.k<st.d||st.k>80)br++;
  if(fibo.StrongSupport!==undefined&&cp<=fibo.StrongSupport)b+=2;
  else if(fibo.Support!==undefined&&cp<=fibo.Support*1.02)b++;
  if(fibo.StrongResistance!==undefined&&cp>=fibo.StrongResistance)br+=2;
  else if(fibo.Resistance!==undefined&&cp>=fibo.Resistance*0.98)br++;
  
  // --- 🆕 K线形态 ---
  patterns.forEach(p=>{if(p.dir==='bull')b+=p.weight;else if(p.dir==='bear')br+=p.weight;});
  
  // --- 🆕 OBV背离 ---
  if(obv.div){if(obv.div.type==='bull')b+=4;else br+=4;} // 背离权重极高
  
  // --- 🆕 成交量诊断 ---
  volDiag.diag.forEach(d=>{if(d.dir==='bull')b+=2;else if(d.dir==='bear')br+=2;});
  
  // --- 🆕 大周期共振 ---
  if(htTrend){if(htTrend==='上涨')b+=2;else if(htTrend==='下跌')br+=2;}
  
  if(b>br)return'上涨';if(br>b)return'下跌';return'中性';
}

// ========== 主分析 ==========
async function startAnalysis(){
  const btn=document.getElementById('btnAnalyze'),log=document.getElementById('logOutput');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>分析中...';
  log.textContent='正在获取数据...\n';
  const symSelect=document.getElementById('symbol').value;
  const symRaw=symSelect==='other'?document.getElementById('customSymbol').value.trim():symSelect;
  if(!symRaw){log.textContent='❌ 请输入币种';btn.disabled=false;btn.innerHTML='📈 开始分析';return}
  const sym=symRaw.replace(/\s+/g,'').toUpperCase().replace('/','');
  const futures=isFutures;
  const base=futures?'https://fapi.binance.com/fapi/v1/klines':'https://api.binance.com/api/v3/klines';
  const cycle=document.getElementById('cycle').value;
  const iv={'10分钟':'15m','30分钟':'30m','1小时':'1h','4小时':'4h'}[cycle];
  const lm=1000;
  const url=`${base}?symbol=${sym}&interval=${iv}&limit=${lm}`;

  // 大周期映射
  const htMap={'10分钟':'1h','30分钟':'1h','1小时':'4h','4小时':'1d'};
  const htIv=cycle==='10分钟'?'1h':cycle==='30分钟'?'1h':cycle==='1小时'?'4h':'1d';
  const htUrl=`${base}?symbol=${sym}&interval=${htIv}&limit=100`;

  try{
    // 并行取当前周期 + 大周期
    const[rCur,rHt]=await Promise.all([fetch(url),fetch(htUrl)]);
    if(!rCur.ok)throw new Error('HTTP '+rCur.status);
    
    const d=await rCur.json();
    const k=d.map(x=>({o:+x[1],h:+x[2],l:+x[3],c:+x[4],v:+x[5]}));
    const c=k.map(x=>x.c),h=k.map(x=>x.h),l=k.map(x=>x.l),v=k.map(x=>x.v),cp=c[c.length-1];
    
    // 基础指标
    const rsi=calcRSI(c),ma=calcMA(c),bb=calcBB(c),macd=calcMACD(c),st=calcStoch(h,l,c);
    const atr=calcATR(h,l,c),av=v.slice(-20).reduce((a,b)=>a+b,0)/20,cv=v[v.length-1],vr=av>0?cv/av:0;
    const e12=calcEMA(c,12),e26=calcEMA(c,26),fibo=calcFib(Math.max(...h.slice(-20)),Math.min(...l.slice(-20)));
    
    // 🆕 K线形态
    const patterns=detectPatterns(k);
    // 🆕 OBV
    const obv=calcOBV(k);
    // 🆕 关键价位
    const levels=keyLevels(h,l,c);
    // 🆕 成交量诊断
    const volDiag=volDiagnosis(k);
    // 🆕 大周期方向
    let htTrend=null,htInfo='';
    if(rHt.ok){
      const hd=await rHt.json(),hk=hd.map(x=>({o:+x[1],h:+x[2],l:+x[3],c:+x[4],v:+x[5]}));
      const hc=hk.map(x=>x.c),hcp=hc[hc.length-1];
      const hma20=calcMA(hc,20),he12=calcEMA(hc,12),he26=calcEMA(hc,26);
      htTrend=he12>he26&&hcp>hma20?'上涨':he12<he26&&hcp<hma20?'下跌':'中性';
      htInfo=`${htMap[cycle]}周期: ${htTrend==='上涨'?'🟢':htTrend==='下跌'?'🔴':'🟡'}趋势=${htTrend} 价=${hcp.toFixed(2)}`;
    }
    
    // 综合趋势
    const trend=vote(rsi,ma,cp,bb,macd,st,atr,av,fibo,e12,e26,patterns,obv,volDiag,htTrend);
    
    // 构建输出
    const cvR=volDiag.spike>1.5?`🔥 放量${volDiag.spike.toFixed(1)}x`:
              volDiag.spike<0.6?`🥶 缩量${volDiag.spike.toFixed(1)}x`:`正常 ${volDiag.spike.toFixed(1)}x`;
    
    let patStr=patterns.length?patterns.map(p=>p.name).join('\n'):'无显著形态';
    let obvStr=obv.div?obv.div.name:`OBV趋势${obv.trend==='up'?'向上':'向下'}`;
    let volDiagStr=volDiag.diag.length?volDiag.diag.map(d=>d.name).join('\n'):'无量能异常';

// ========== AI分析 ==========
async function aiAnalysis(){
  const key=document.getElementById('apiKey').value.trim()||apiKey;
  if(!key){alert('请先输入 DeepSeek API Key！');return}
  if(!lastData.cp){alert('请先点击"开始分析"获取数据！');return}
  apiKey=key;localStorage.setItem('deepseek_api_key',key);
  const btn=document.getElementById('btnAI'),log=document.getElementById('logOutput');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>AI分析中...';
  log.textContent+='\n🤖 正在请求 DeepSeek...\n';
  const d=lastData,ms=d.macd.macdLine>d.macd.signalLine?'金叉（看涨）':'死叉（看跌）';
  const cd=d.cycle==='10分钟'?'超短线10分钟事件合约':d.cycle==='30分钟'?'短线30分钟事件合约':d.cycle==='1小时'?'短线1小时合约':'4小时合约';
  const patInfo=d.patterns&&d.patterns.length?d.patterns.map(p=>p.name).join('；'):'无显著形态';
  const obvInfo=d.obv&&d.obv.div?d.obv.div.name:'OBV正常';
  const volDiagInfo=d.volDiag&&d.volDiag.diag.length?d.volDiag.diag.map(x=>x.name).join('；'):'无量能异常';
  const htInfo=d.htInfo||'无大周期数据';
  const lvInfo=d.levels?`阻力=${d.levels.resistances.slice(0,3).map(x=>x.toFixed(2)).join(',')} 支撑=${d.levels.supports.slice(0,3).map(x=>x.toFixed(2)).join(',')}`:'';

  const prompt=`你是一位顶级加密货币交易大师。分析 ${d.sym} ${cd}（${d.market}市场）。

规则：超短线事件合约，只给多或空，不给观望。支撑=做多入场区，阻力=做空入场区。

【量价结构】
K线形态: ${patInfo}
成交量诊断: ${volDiagInfo}
OBV分析: ${obvInfo}

【关键价位】
${lvInfo}

【技术指标】
当前价=${d.cp.toFixed(2)} RSI=${d.rsi.toFixed(2)} MA20=${d.ma.toFixed(2)} EMA12=${d.e12.toFixed(2)} EMA26=${d.e26.toFixed(2)} 布林上=${d.bb.upper.toFixed(2)} 布林下=${d.bb.lower.toFixed(2)} MACD=${ms} %K=${d.st.k.toFixed(2)} ATR=${d.atr.toFixed(2)} 量比=${d.vr.toFixed(2)} 斐波支撑=${d.fibo.Support.toFixed(2)} 斐波阻力=${d.fibo.Resistance.toFixed(2)}

【大周期共振】
${htInfo}

【系统综合趋势】${d.trend}

格式(严格5行):
方向：多/空
入场：XXX-XXX
止损：XXX
目标：XXX
理由：一句话（结合量价+形态+关键位）`;

  try{
    const r=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:'你是顶级交易大师。只给明确多/空判断，不出现"建议观望""试多""偏多"等模糊词。结合量价结构+形态+关键位给出理由。回答不超过7行。'},{role:'user',content:prompt}],temperature:.2,max_tokens:600})
    });
    const j=await r.json();
    if(!r.ok)throw new Error(j.error?.message||'HTTP '+r.status);
    log.textContent+=j.choices[0].message.content;
  }catch(e){log.textContent+='\n❌ AI失败: '+e.message}
  btn.disabled=false;btn.innerHTML='🤖 AI 智能分析';
}
